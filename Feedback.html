<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
</head>
<body>
    <header>
        <h1>Feedback</h1>
    </header>
    <h1>Submit Feedback</h1>
    <form>
        <label>Name:
            <input type="text" placeholder="Enter your Name" autocomplete="name">
        </label>
        <br/>
        <label>Email:
            <input type="email" placeholder="Enter your Email" autocomplete="email">
        </label>
        <br/>
        <label>Feedback:
            <textarea placeholder="Enter your Feedback"></textarea>
        </label>
        <br/>
        <label>Rating:
            <select name="feedback_rating">
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="average">Average</option>
                <option value="poor">Poor</option>
            </select>
        </label>
        <br/>

        <legend>Would you like to recomend it?</legend>
            <label>
                <input type="radio" value="Yes"  name="recommend">Yes
            </label>
            <label>
            <input type="radio" value="No" name="recommend">No
            </label>
        <br/>
        <input type="checkbox" name="agree" value="agree">
        <label>
            I agree to the terms and conditions
        </label>
        <br/>
        <button type="submit">Submit</button>
    </form>

        </ul>
    </nav>
    </footer>
</body>
</html>
